name: Build and Deploy (FTP)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Composer autoload paths
        run: |
          if [ ! -e includes ]; then
            ln -s priorities/includes includes
          fi

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Build assets
        run: npm run build

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ftp.elec0.com
          username: github-action@priorities.elec0.com
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          local-dir: ./priorities/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/coverage/**
            **/test-results/**
            **/tests/**
            **/.vscode/**
            **/docker/**
            docker-compose.yml
            notes.md
            README.md
            architecture.md
            playwright.config.ts
            tsconfig.json
            vite.config.ts
            config.php

      - name: Deploy vendor to FTP root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ftp.elec0.com
          username: github-action@priorities.elec0.com
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /vendor/
          local-dir: ./vendor/
